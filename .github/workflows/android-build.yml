name: Build Android APK

# سيتم تشغيل البناء تلقائياً عند رفع أي تعديل على فرع main
on:
  push:
    branches:
      - main
  # يتيح لك تشغيل البناء يدوياً من واجهة GitHub
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود المصدري من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة Java (الإصدار 17 هو الأحدث والأكثر استقراراً لبناء أندرويد)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. إعداد بيئة Flutter (يستخدم أحدث إصدار مستقر)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. حقن ملف Firebase السري (خطوة حاسمة لنجاح البناء)
      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      # 5. تنزيل الحزم والمكاتب المرفقة في pubspec.yaml
      - name: Install Dependencies
        run: flutter pub get

      # 6. بناء ملف الـ APK النهائي
      - name: Build APK
        run: flutter build apk --release

      # 7. رفع ملف الـ APK لتتمكن من تحميله من واجهة GitHub
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          # مسار حفظ الملف في خوادم البناء
          path: build/app/outputs/flutter-apk/app-release.apk
